syntax = "proto3";

package graph.substreams.data_service.provider.v1;

import "graph/substreams/data_service/common/v1/types.proto";

// PaymentGatewayService is the service that connects the consumer sidecar to the
// provider gateway for payment negotiation and RAV exchange.
//
// Flow: consumer sidecar (sc) <-> provider gateway (psc)
service PaymentGatewayService {
  // StartSession initiates a payment session with the provider.
  // The consumer sidecar calls this to establish a session before
  // the substreams client connects to the provider.
  rpc StartSession(StartSessionRequest) returns (StartSessionResponse);

  // GetSessionStatus returns basic status for a session, intended for operator
  // tooling and demo/integration flows.
  rpc GetSessionStatus(GetSessionStatusRequest) returns (GetSessionStatusResponse);

  // SubmitRAV submits a signed RAV to the provider gateway.
  // Deprecated for provider-managed runtime sessions: live provider-issued
  // rav_request messages must be answered on the bound PaymentSession stream.
  // This unary RPC remains only for legacy/manual non-runtime flows.
  rpc SubmitRAV(SubmitRAVRequest) returns (SubmitRAVResponse);

  // PaymentSession is a bidirectional stream for ongoing payment negotiation.
  // This allows the provider gateway to request RAVs and notify about
  // funding requirements in real-time.
  rpc PaymentSession(stream PaymentSessionRequest) returns (stream PaymentSessionResponse);
}

message GetSessionStatusRequest {
  // The session ID
  string session_id = 1;
}

message GetSessionStatusResponse {
  // Whether the session is active.
  bool active = 1;
  // Payment status snapshot (best-effort).
  common.v1.PaymentStatus payment_status = 2;
  // Persisted terminal reason once the session is no longer active.
  common.v1.EndReason end_reason = 3;
}

message StartSessionRequest {
  // The escrow account funding this session
  common.v1.EscrowAccount escrow_account = 1;
  // Initial RAV (can be a zero-value RAV for new sessions)
  common.v1.SignedRAV initial_rav = 2;
}

message StartSessionResponse {
  // Unique session identifier assigned by the provider
  string session_id = 1;
  // The RAV to use for authentication (may be the same or different from initial)
  common.v1.SignedRAV use_rav = 2;
  // Whether the session was accepted
  bool accepted = 3;
  // If not accepted, the reason for rejection
  string rejection_reason = 4;
  // The provider's pricing configuration for this session.
  // For MVP this is confirmatory/observational only, not a negotiation surface.
  common.v1.PricingConfig pricing_config = 5;
  // The session-specific data-plane endpoint for Substreams traffic.
  string data_plane_endpoint = 6;
}

message SubmitRAVRequest {
  // The session ID
  string session_id = 1;
  // The signed RAV being submitted.
  // Deprecated for provider-managed runtime sessions when a live provider-issued
  // rav_request is already outstanding on PaymentSession.
  common.v1.SignedRAV signed_rav = 2;
  // The usage this RAV covers.
  common.v1.Usage usage = 3;
}

message SubmitRAVResponse {
  // Whether the RAV was accepted
  bool accepted = 1;
  // If not accepted, the reason for rejection
  string rejection_reason = 2;
  // Whether the session should continue
  bool should_continue = 3;
}

// Messages from consumer sidecar to provider gateway in the bidirectional stream
message PaymentSessionRequest {
  // The session ID this stream message applies to.
  // Required: the provider binds a PaymentSession stream to exactly one session.
  string session_id = 10;
  oneof message {
    // Signed RAV in response to a live provider-issued rav_request.
    // This is the authoritative runtime response path for managed sessions.
    SignedRAVSubmission rav_submission = 1;
    // Acknowledgment of a funds request
    FundsAcknowledgment funds_ack = 2;
  }
}

// Messages from provider gateway to consumer sidecar in the bidirectional stream
message PaymentSessionResponse {
  oneof message {
    // Request for a new signed RAV
    RAVRequest rav_request = 1;
    // Notification that more escrow funds are needed
    NeedMoreFunds need_more_funds = 2;
    // Session control message
    SessionControl session_control = 3;
  }
}

message SignedRAVSubmission {
  // The signed RAV. For provider-managed runtime sessions this must satisfy the
  // exact in-flight rav_request snapshot, not a later live usage total.
  common.v1.SignedRAV signed_rav = 1;
  // The usage snapshot this response is satisfying. For provider-managed runtime
  // sessions this must exactly match the in-flight rav_request usage.
  common.v1.Usage usage = 2;
}

message FundsAcknowledgment {
  // Whether more funds will be deposited
  bool will_deposit = 1;
  // Expected deposit amount in GRT
  common.v1.GRT deposit_amount = 2;
}

message RAVRequest {
  // The current RAV to extend.
  common.v1.SignedRAV current_rav = 1;
  // The authoritative usage snapshot being requested. For provider-managed
  // runtime sessions the client must answer this exact snapshot on PaymentSession.
  common.v1.Usage usage = 2;
  // Deadline for the RAV response (Unix timestamp)
  uint64 deadline = 3;
}

message NeedMoreFunds {
  // Current outstanding RAVs that will be collected
  repeated common.v1.SignedRAV outstanding_ravs = 1;
  // Total outstanding value in GRT
  common.v1.GRT total_outstanding = 2;
  // Current escrow balance in GRT
  common.v1.GRT escrow_balance = 3;
  // Minimum additional funds needed in GRT
  common.v1.GRT minimum_needed = 4;
}

message SessionControl {
  // Control action
  enum Action {
    ACTION_UNSPECIFIED = 0;
    // Continue the session
    ACTION_CONTINUE = 1;
    // Stop the session gracefully
    ACTION_STOP = 2;
    // Pause the session (temporary)
    ACTION_PAUSE = 3;
  }
  Action action = 1;
  // Reason for the action
  string reason = 2;
}
